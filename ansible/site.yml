---
- name: Apply Common Configuration
  hosts: all
  become: true
  pre_tasks:
    - name: Find conflicting Docker source files
      shell: grep -l "download.docker.com" /etc/apt/sources.list.d/*
      register: docker_conflicts
      ignore_errors: true
      changed_when: false
      failed_when: docker_conflicts.rc != 0 and docker_conflicts.rc != 1

    - name: Delete conflicting Docker source files
      file:
        path: "{{ item }}"
        state: absent
      with_items: "{{ docker_conflicts.stdout_lines }}"
      when: docker_conflicts.rc == 0

    - name: Remove Docker from main sources.list
      replace:
        path: /etc/apt/sources.list
        regexp: "^deb.*download\\.docker\\.com.*"
        replace: ""

    - name: Find conflicting Nvidia source files
      shell: grep -l "nvidia" /etc/apt/sources.list.d/*
      register: nvidia_conflicts
      ignore_errors: true
      changed_when: false
      failed_when: nvidia_conflicts.rc != 0 and nvidia_conflicts.rc != 1

    - name: Delete conflicting Nvidia source files
      file:
        path: "{{ item }}"
        state: absent
      with_items: "{{ nvidia_conflicts.stdout_lines }}"
      when: nvidia_conflicts.rc == 0

    - name: Remove Nvidia from main sources.list
      replace:
        path: /etc/apt/sources.list
        regexp: "^deb.*nvidia.*"
        replace: ""
  roles:
    - common

- name: Configure Server
  hosts: server
  become: true
  # vars_files:
  #   - secrets.yml
  pre_tasks:
    # TODO(magos): If running ansible *from the server itself*, place your age
    # private key at ~/.config/sops/age/keys.txt (or set SOPS_AGE_KEY_FILE).
    # The matching recipient is in secrets.sops.yml's `sops.age` block. Without
    # it, this play stops at "Fail if secrets were not loaded" — the common
    # play (above) still applies cleanly. The key normally lives on whatever
    # workstation runs ansible (laptop / Semaphore); the server has never had
    # it because deploys historically came from elsewhere.
    - name: Load encrypted secrets
      community.sops.load_vars:
        file: secrets.sops.yml
      tags: [always]
      ignore_errors: true
      register: sops_load

    - name: Fail if secrets were not loaded
      fail:
        msg: "Failed to load secrets.sops.yml. Ensure you have migrated secrets to SOPS."
      when: sops_load.failed
  roles:
    - common
    - amd_gpu
    - server
    - tailscale
    - github_runner
    - role: sunshine
      tags: sunshine

# Note: the 'desktop' host group inherits the 'common' play above (hosts: all),
# which now includes TypeScript and the rest of the dev tooling. No separate
# desktop play is needed.
