---
# --- 1. DOCKER SETUP ---
- name: Install gnupg (required for key de-armoring)
  apt:
    name: gnupg
    state: present

- name: Set up Docker APT repository
  include_tasks: setup_apt_repo.yml
  vars:
    apt_repo_name: Docker
    apt_repo_key_url: https://download.docker.com/linux/ubuntu/gpg
    apt_repo_keyring_path: /usr/share/keyrings/docker-archive-keyring.gpg
    apt_repo_list_name: docker
    apt_repo_string: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable

- name: Install Docker Components
  apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
    state: present

- name: Install Kernel Headers
  apt:
    name: linux-headers-generic
    state: present

# --- 2. NVIDIA PURGE (idempotent — cleans up any pre-AMD remnants) ---
# Server now runs an AMD Radeon AI PRO R9700; GPU enablement lives in the
# amd_gpu role. This block removes any Nvidia/CUDA bits left from the prior
# RTX 3080 setup so apt and Docker don't trip over them.
- name: List installed Nvidia/CUDA packages
  shell: dpkg -l | awk '$1=="ii" && ($2 ~ /^(nvidia|libnvidia|cuda|libcuda)/) {print $2}'
  register: nvidia_pkgs
  changed_when: false

- name: Purge Nvidia/CUDA packages
  apt:
    name: "{{ nvidia_pkgs.stdout_lines }}"
    state: absent
    purge: true
    autoremove: true
  when: nvidia_pkgs.stdout_lines | length > 0

- name: Remove Nvidia CDI specification
  file:
    path: /etc/cdi/nvidia.yaml
    state: absent

# --- 3. POWER MANAGEMENT (Prevent server from suspending) ---
# Belt-and-suspenders: systemd mask is the hard block; greeter dconf stops
# GDM from even trying. Both are idempotent.
- name: Mask systemd sleep targets
  systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
  loop:
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target

- name: Disable GDM greeter idle-suspend
  lineinfile:
    path: /etc/gdm3/greeter.dconf-defaults
    regexp: '^#?\s*sleep-inactive-ac-type='
    line: "sleep-inactive-ac-type='nothing'"

- name: Add user to Docker group
  user:
    name: "{{ user_name }}"
    groups: docker
    append: true

- name: Ensure /data directory is owned by user (for Copyparty)
  file:
    path: /data
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Ensure aperture directory is owned by user
  file:
    path: "/home/{{ user_name }}/construct-server/aperture"
    state: directory
    recurse: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

# --- 3. DEPLOYMENT (Clone the Repo) ---
- name: Clone Construct Monorepo
  become_user: "{{ user_name }}"
  git:
    repo: "{{ repo_url | default('https://github.com/Einlanzerous/construct-server.git') }}"
    dest: "/home/{{ user_name }}/construct-server"
    version: main
    force: true

- name: Read .env file contents
  set_fact:
    env_file_content: "{{ lookup('file', playbook_dir + '/../.env') }}"

- name: Validate required .env keys are present
  assert:
    that:
      - "env_file_content is search(item)"
    fail_msg: "Missing required key '{{ item }}' in .env file"
  loop:
    # Datadog
    - DD_API_KEY
    - DD_SITE
    - DD_TAGS
    # Semaphore UI
    - SEMAPHORE_ADMIN_PASSWORD
    - SEMAPHORE_ADMIN_NAME
    - SEMAPHORE_ADMIN_EMAIL
    - SEMAPHORE_ADMIN
    # GitHub / GHCR
    - GITHUB_USER
    - GITHUB_PAT
    # Service ports
    - COOK_BOOK_PORT
    - SWITCHYARD_PORT
    # Postgres / per-service DB passwords
    - POSTGRES_PASSWORD
    - COOK_BOOK_DB_PASSWORD
    - SWITCHYARD_DB_PASSWORD
    # Imperium-Loop pipeline (n8n / Switchyard / Anthropic / Discord)
    - N8N_API_KEY
    - ANTHROPIC_API_KEY
    - SWITCHYARD_PUBLIC_URL
    - DISCORD_BOT_TOKEN
    - DISCORD_GUILD_ID
    - DISCORD_CHANNEL_ID

- name: Copy .env file to server
  copy:
    src: "{{ playbook_dir }}/../.env"
    dest: "/home/{{ user_name }}/construct-server/.env"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
    force: true
  notify: Restart Docker

- name: Ensure config directory exists
  file:
    path: "/home/{{ user_name }}/construct-server/config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Create copyparty configuration
  copy:
    dest: "/home/{{ user_name }}/construct-server/config/copyparty.conf"
    content: |
      [global]
        # e = idk

      [/]
        /w
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Patch docker-compose.yml to mount copyparty config
  lineinfile:
    path: "/home/{{ user_name }}/construct-server/docker-compose.yml"
    insertafter: "      - /data:/w/hdd"
    line: "      - ./config/copyparty.conf:/cfg/copyparty.conf"
    state: present

- name: Ensure construct_net Docker network exists
  community.docker.docker_network:
    name: construct_net
    driver: bridge
    state: present

- name: Load .env variables
  slurp:
    src: "/home/{{ user_name }}/construct-server/.env"
  register: env_file_raw

- name: Parse .env into facts
  set_fact:
    dotenv: "{{ dict(env_file_raw.content | b64decode | regex_findall('(?m)^([A-Z_]+)=(.*)$')) }}"

- name: Log in to GitHub Container Registry
  become_user: "{{ user_name }}"
  shell: echo "{{ dotenv.GITHUB_PAT }}" | docker login ghcr.io -u "{{ dotenv.GITHUB_USER }}" --password-stdin
  no_log: true
  changed_when: false

- name: Start Docker Stack
  become_user: "{{ user_name }}"
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "/home/{{ user_name }}/construct-server"
  register: docker_stack_start
  changed_when: "'Running' not in docker_stack_start.stdout"

- name: Pull Ollama Models
  become_user: "{{ user_name }}"
  command: "docker exec ollama ollama pull {{ item }}"
  loop: "{{ ollama_models }}"
  register: ollama_pull
  changed_when: "'success' in ollama_pull.stdout"
  ignore_errors: true

- name: Get installed Ollama models
  become_user: "{{ user_name }}"
  command: docker exec ollama ollama list
  register: ollama_list
  changed_when: false

- name: Remove unlisted Ollama models
  become_user: "{{ user_name }}"
  command: "docker exec ollama ollama rm {{ item }}"
  loop: "{{ ollama_list.stdout_lines[1:] | map('split') | map('first') | list }}"
  when: item not in ollama_models
  changed_when: true
