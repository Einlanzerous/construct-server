---
# --- 1. CORE SYSTEM & USER ---
- name: Update apt cache and upgrade system
  apt:
    update_cache: true
    upgrade: dist
  register: system_update

- name: Install System Basics
  apt:
    name: [git, curl, unzip, zsh, htop, bat, fzf, fonts-powerline, software-properties-common, fail2ban, age]
    state: present
  tags: [common, sops]

- name: Download SOPS .deb
  get_url:
    url: "{{ sops_deb_url }}"
    dest: "/tmp/sops.deb"
    mode: "0644"
  tags: [common, sops]

- name: Install SOPS
  apt:
    deb: "/tmp/sops.deb"
    state: present
  tags: [common, sops]

- name: Cleanup SOPS .deb
  file:
    path: "/tmp/sops.deb"
    state: absent
  tags: [common, sops]

- name: Install community.sops collection (Local)
  command: ansible-galaxy collection install community.sops
  delegate_to: localhost
  become: false
  changed_when: false
  tags: [common, sops]

- name: Set timezone to America/Chicago
  timezone:
    name: America/Chicago

- name: "Create user: {{ user_name }}"
  user:
    name: "{{ user_name }}"
    shell: /usr/bin/zsh
    groups: sudo
    append: true
    create_home: true

# --- 2. FONTS ---
- name: Ensure local fonts directory exists
  file:
    path: "/home/{{ user_name }}/.local/share/fonts"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Install MesloLGS NF fonts
  get_url:
    url: "https://github.com/romkatv/powerlevel10k-media/raw/master/{{ item | urlencode }}"
    dest: "/home/{{ user_name }}/.local/share/fonts/{{ item }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  with_items:
    - "MesloLGS NF Regular.ttf"
    - "MesloLGS NF Bold.ttf"
    - "MesloLGS NF Italic.ttf"
    - "MesloLGS NF Bold Italic.ttf"
  register: fonts_installed

- name: Update font cache
  become_user: "{{ user_name }}"
  ansible.builtin.command: fc-cache -fv
  when: fonts_installed.changed

# --- 2. OH-MY-ZSH & POWERLEVEL10K ---
- name: Check for Oh-My-Zsh installation
  stat:
    path: "/home/{{ user_name }}/.oh-my-zsh"
  register: omz_folder

- name: Install Oh-My-Zsh (Unattended)
  become_user: "{{ user_name }}"
  shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  when: not omz_folder.stat.exists

- name: Install Powerlevel10k Theme
  become_user: "{{ user_name }}"
  git:
    repo: "https://github.com/romkatv/powerlevel10k.git"
    dest: "/home/{{ user_name }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1

# --- 3. ZSH PLUGINS & CONFIG ---
- name: Install Zsh Plugins
  become_user: "{{ user_name }}"
  git:
    repo: "{{ item.repo }}"
    dest: "/home/{{ user_name }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
  loop:
    - { name: zsh-autosuggestions, repo: "https://github.com/zsh-users/zsh-autosuggestions" }
    - { name: zsh-syntax-highlighting, repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git" }
    - { name: zsh-autocomplete, repo: "https://github.com/marlonrichert/zsh-autocomplete.git" }

- name: Deploy .p10k.zsh (Visual Match)
  copy:
    src: .p10k.zsh
    dest: "/home/{{ user_name }}/.p10k.zsh"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"

- name: Deploy .zshrc
  template:
    src: zshrc.j2
    dest: "/home/{{ user_name }}/.zshrc"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"

# --- 4. SSH KEYS ---
- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ user_name }}/.ssh"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0700"

- name: Generate SSH key if not present
  become_user: "{{ user_name }}"
  community.crypto.openssh_keypair:
    path: "/home/{{ user_name }}/.ssh/id_ed25519"
    type: ed25519
    state: present
    force: false

# --- 5. NODE.JS VIA FNM & GEMINI CLI ---
- name: Install fnm (Fast Node Manager)  # noqa: command-instead-of-module
  become_user: "{{ user_name }}"
  shell: curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
  args:
    creates: "/home/{{ user_name }}/.local/share/fnm/fnm"
  environment:
    HOME: "/home/{{ user_name }}"

- name: Check if Node.js 24 LTS is installed via fnm
  become_user: "{{ user_name }}"
  shell: |
    export PATH="/home/{{ user_name }}/.local/share/fnm:$PATH"
    fnm list | grep -q "v24\." && echo "installed" || echo "missing"
  register: node24_installed
  changed_when: false
  environment:
    HOME: "/home/{{ user_name }}"

- name: Install Node.js 24 LTS via fnm and set as default
  become_user: "{{ user_name }}"
  shell: |
    export PATH="/home/{{ user_name }}/.local/share/fnm:$PATH"
    fnm install 24 && fnm default 24
  environment:
    HOME: "/home/{{ user_name }}"
  when: node24_installed.stdout == "missing"

- name: Install Google Gemini CLI
  become_user: "{{ user_name }}"
  shell: |
    export PATH="/home/{{ user_name }}/.local/share/fnm:$PATH"
    eval "$(fnm env --shell bash)"
    npm install -g @google/gemini-cli
  environment:
    HOME: "/home/{{ user_name }}"
  changed_when: false
