services:
  # --- AI & LLM STACK ---
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # 64K default context. The R9700 has 32 GiB VRAM — Ollama's stock 2K
      # default is absurdly tight for a card this size. 64K is the sweet spot
      # for daily coding work: fits 30B-class weights + KV cache with headroom
      # (gemma4:31b at 64K ≈ 26 GB resident). Callers wanting longer ctx pass
      # `options.num_ctx` per request; callers wanting shorter to free VRAM
      # do the same. Beware: 128K+ on a 30B model spills to system RAM.
      - OLLAMA_NUM_CTX=65536
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"   # video
      - "993"  # render (host GID — name lookup fails in ollama:rocm image)
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - default
      - construct_net

  # --- WEB UI (Open WebUI) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- WATCHTOWER (Auto-Update) ---
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_SCHEDULE=0 0 4 * * 1
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped

  # --- FILE SHARING ---
  copyparty:
    image: copyparty/ac
    container_name: copyparty
    restart: unless-stopped
    ports:
      - "3923:3923"
    volumes:
      - copyparty_data:/w
      - /data:/w/hdd
      - ./config/copyparty.conf:/cfg/copyparty.conf
    environment:
      - E=idk  # Enable basic drag-and-drop upload

  # --- OBSERVABILITY (Datadog + Dozzle) ---
  datadog:
    image: datadog/agent:7
    container_name: datadog
    restart: unless-stopped
    pid: host
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE}
      - DD_TAGS=${DD_TAGS}
      - DD_DOCKER_LABELS_AS_TAGS=true
      - DD_DOCKER_LISTEN_ON=/var/run/docker.sock
      - DD_PROCESS_AGENT_ENABLED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    # GPU reservation disabled during Nvidia → AMD R9700 swap.
    # Datadog Agent supports AMD/ROCm metrics; revisit when ROCm role lands.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, utility]

  # --- Container Logging (Dozzle) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # --- MONITORING (Uptime Kuma) ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  # --- DASHBOARD (Aperture) ---
  aperture-backend:
    image: ghcr.io/einlanzerous/aperture/backend:latest
    container_name: aperture-backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./aperture/config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - backend

  aperture-frontend:
    image: ghcr.io/einlanzerous/aperture/frontend:latest
    container_name: aperture-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - aperture-backend

  # --- AUTOMATION (n8n / Vox-Command) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=mammoth
      - GITHUB_PAT=${GITHUB_PAT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SWITCHYARD_TOKEN=${SWITCHYARD_API_TOKEN}
      - SWITCHYARD_TOKEN_N8N_VOX_DICTATE=${SWITCHYARD_TOKEN_N8N_VOX_DICTATE}
      - SWITCHYARD_WEBHOOK_SECRET=${SWITCHYARD_WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - construct_net

  # --- AUTOMATION (Semaphore UI) ---
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - SEMAPHORE_DB_DIALECT=sqlite
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHORE_ADMIN_NAME}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHORE_ADMIN_EMAIL}
      - SEMAPHORE_ADMIN=${SEMAPHORE_ADMIN}
    volumes:
      - semaphore_data:/etc/semaphore

  # --- DATABASE (Shared PostgreSQL) ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - COOK_BOOK_DB_PASSWORD=${COOK_BOOK_DB_PASSWORD}
      - SWITCHYARD_DB_PASSWORD=${SWITCHYARD_DB_PASSWORD}
    networks:
      - construct_net

  # --- MCP TOOLING (Servo-Signal) ---
  servo-signal:
    build:
      context: ../imperium-loop/servo-signal
      dockerfile: Dockerfile
    container_name: servo-signal
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACES_VOLUME=construct-server_servo_signal_workspaces
    volumes:
      - servo_signal_workspaces:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- HUMAN-IN-THE-LOOP (Autosavant Discord bot) ---
  autosavant-bot:
    build:
      context: ../imperium-loop/autosavant-bot
      dockerfile: Dockerfile
    container_name: autosavant-bot
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - AUTOSAVANT_HTTP_TOKEN=${AUTOSAVANT_HTTP_TOKEN}
      - SWITCHYARD_TOKEN=${SWITCHYARD_API_TOKEN}
      - STATE_PATH=/data/state.json
    volumes:
      - autosavant_state:/data
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- APP SERVICES ---
  cook_book:
    image: ghcr.io/einlanzerous/cook_book:latest
    container_name: cook_book
    restart: unless-stopped
    ports:
      - "${COOK_BOOK_PORT}:${COOK_BOOK_PORT}"
    environment:
      - PORT=${COOK_BOOK_PORT}
      - DATABASE_URL=postgres://cook_book_user:${COOK_BOOK_DB_PASSWORD}@postgres:5432/cook_book?sslmode=disable
    networks:
      - construct_net
    depends_on:
      - postgres

  # --- TASK MANAGEMENT (Switchyard) ---
  # Backend (API only). Service name `switchyard` so agent URLs
  # (`http://switchyard:4002/v1/...`) resolve on construct_net.
  # No host port — only the frontend exposes one.
  switchyard:
    image: ghcr.io/einlanzerous/switchyard/backend:latest
    container_name: switchyard
    restart: unless-stopped
    environment:
      - PORT=4002
      - DATABASE_URL=postgres://switchyard_user:${SWITCHYARD_DB_PASSWORD}@postgres:5432/switchyard?sslmode=disable
      - PUBLIC_URL=${SWITCHYARD_PUBLIC_URL:-http://localhost:4002}
      - UPLOAD_DIR=/data/uploads
      - BOOTSTRAP_TOKEN=${SWITCHYARD_BOOTSTRAP_TOKEN}
      # Public GitHub webhook receiver — exposed via Tailscale Funnel at
      # https://imperial-construct.tail64150e.ts.net/v1/external/github.
      # HMAC gates all requests; absent secret = receiver returns 503.
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      # Wildcard prefix — match any <KEY>-<NUM> ticket reference in PR
      # titles/branches and resolve via the projects table. Strict "SWY"
      # works fine for a single project but doesn't scale to LOOP etc.
      - EXTERNAL_REF_KEY_PREFIX=*
    volumes:
      - switchyard_uploads:/data/uploads
    networks:
      - construct_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4002/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - postgres
    labels:
      # Watchtower runs Mondays at 04:00 with rolling restart — opt out so deploys
      # are explicit. (Suspected source of the prior password-drift bug.)
      - "com.centurylinklabs.watchtower.enable=false"

  # Frontend (Vue static + tiny Bun passthrough for /v1/* and /healthz).
  switchyard-frontend:
    image: ghcr.io/einlanzerous/switchyard/frontend:latest
    container_name: switchyard-frontend
    restart: unless-stopped
    ports:
      - "${SWITCHYARD_PORT:-4002}:4002"
    environment:
      - PORT=4002
      - BACKEND_URL=http://switchyard:4002
    networks:
      - construct_net
    depends_on:
      switchyard:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  open-webui:
  ollama_data:
  n8n_data:
  copyparty_data:
  uptime-kuma-data:
  semaphore_data:
  postgres_data:
  servo_signal_workspaces:
  autosavant_state:
  switchyard_uploads:

networks:
  construct_net:
    external: true
