services:
  # --- AI & LLM STACK ---
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # 64K default context. The R9700 has 32 GiB VRAM — Ollama's stock 2K
      # default is absurdly tight for a card this size. 64K is the sweet spot
      # for daily coding work: fits 30B-class weights + KV cache with headroom
      # (gemma4:31b at 64K ≈ 26 GB resident). Callers wanting longer ctx pass
      # `options.num_ctx` per request; callers wanting shorter to free VRAM
      # do the same. Beware: 128K+ on a 30B model spills to system RAM.
      - OLLAMA_NUM_CTX=65536
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"   # video
      - "993"  # render (host GID — name lookup fails in ollama:rocm image)
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - default
      - construct_net

  # --- WEB UI (Open WebUI) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- WATCHTOWER (Auto-Update) ---
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_SCHEDULE=0 0 4 * * 1
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped

  # --- FILE SHARING ---
  copyparty:
    image: copyparty/ac
    container_name: copyparty
    restart: unless-stopped
    ports:
      - "3923:3923"
    volumes:
      - copyparty_data:/w
      - /data:/w/hdd
      - ./config/copyparty.conf:/cfg/copyparty.conf
    environment:
      - E=idk  # Enable basic drag-and-drop upload

  # --- OBSERVABILITY (Datadog + Dozzle) ---
  datadog:
    image: datadog/agent:7
    container_name: datadog
    restart: unless-stopped
    pid: host
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE}
      - DD_TAGS=${DD_TAGS}
      - DD_DOCKER_LABELS_AS_TAGS=true
      - DD_DOCKER_LISTEN_ON=/var/run/docker.sock
      - DD_PROCESS_AGENT_ENABLED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    # GPU reservation disabled during Nvidia → AMD R9700 swap.
    # Datadog Agent supports AMD/ROCm metrics; revisit when ROCm role lands.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, utility]

  # --- Container Logging (Dozzle) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # --- MONITORING (Uptime Kuma) ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  # --- DASHBOARD (Aperture) ---
  aperture-backend:
    image: ghcr.io/einlanzerous/aperture/backend:latest
    container_name: aperture-backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./aperture/config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # AMD GPU monitoring: mount the host ROCm tree so amd-smi is on PATH.
      # Versioned path — update on a ROCm upgrade. Takes effect once the
      # ubuntu-based backend image (with python3) is deployed.
      - /opt/rocm-6.4.4:/opt/rocm:ro
    # GPU device passthrough + render/video groups (GIDs from this host:
    # `getent group render video` -> video=44, render=993).
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"
      - "993"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - backend

  aperture-frontend:
    image: ghcr.io/einlanzerous/aperture/frontend:latest
    container_name: aperture-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - aperture-backend

  # --- AUTOMATION (n8n / Vox-Command) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=mammoth
      # WEBHOOK_URL controls the host n8n stamps into $execution.resumeUrl
      # (the Wait-node signed-resume accessor) and any other webhook URLs it
      # returns. We keep it on the construct_net hostname so Autosavant —
      # which lives in the same Docker network — can POST approve/reject
      # replies back. Host-side debug still works via the 5678:5678 port
      # mapping. See LOOP-22.
      - WEBHOOK_URL=http://n8n:5678/
      # LOOP-28: pipeline GitHub identity. Stored in .env as IL_GH_PAT
      # (Imperium-Loop GitHub PAT, matching the GitHub-side token name);
      # remapped to GITHUB_PAT here so consumer code (Servo-Signal, n8n
      # HTTP nodes) stays unchanged. Token is a classic PAT with repo +
      # workflow scopes.
      - GITHUB_PAT=${IL_GH_PAT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # LOOP-24: provider toggle for The High Review. Default is claude (the
      # workflow's gate node also defaults to claude when unset, this just
      # makes the var visible in `docker exec n8n env` for debugging). Flip
      # to gemini in ~/construct-server/.env to swap back without code edits.
      - HIGH_REVIEW_PROVIDER=${HIGH_REVIEW_PROVIDER:-claude}
      - SWITCHYARD_TOKEN=${SWITCHYARD_API_TOKEN}
      - SWITCHYARD_TOKEN_N8N_VOX_DICTATE=${SWITCHYARD_TOKEN_N8N_VOX_DICTATE}
      - SWITCHYARD_WEBHOOK_SECRET=${SWITCHYARD_WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - construct_net

  # --- AUTOMATION (Semaphore UI) ---
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - SEMAPHORE_DB_DIALECT=sqlite
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHORE_ADMIN_PASSWORD}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHORE_ADMIN_NAME}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHORE_ADMIN_EMAIL}
      - SEMAPHORE_ADMIN=${SEMAPHORE_ADMIN}
    volumes:
      - semaphore_data:/etc/semaphore

  # --- DATABASE (Shared PostgreSQL) ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - COOK_BOOK_DB_PASSWORD=${COOK_BOOK_DB_PASSWORD}
      - SWITCHYARD_DB_PASSWORD=${SWITCHYARD_DB_PASSWORD}
      - CENTRIFUGE_DB_PASSWORD=${CENTRIFUGE_DB_PASSWORD}
      - ARGOSY_DB_PASSWORD=${ARGOSY_DB_PASSWORD}
      # Authentik (SERV-19) — its DB/user is provisioned by db/init-db.sh.
      - AUTHENTIK_DB_PASSWORD=${AUTHENTIK_DB_PASSWORD}
      # Lyceum (LYCM-61) — DB/user provisioned by db/init-db.sh.
      - LYCEUM_DB_PASSWORD=${LYCEUM_DB_PASSWORD}
    networks:
      - construct_net

  # --- MCP TOOLING (Servo-Signal) ---
  servo-signal:
    build:
      context: ../imperium-loop/servo-signal
      dockerfile: Dockerfile
    container_name: servo-signal
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      # LOOP-28: see n8n service comment above. IL_GH_PAT is the classic
      # PAT with repo + workflow scopes; remapped to GITHUB_PAT inside the
      # container so Servo-Signal's Go code (os.Getenv("GITHUB_PAT")) is
      # unchanged.
      - GITHUB_PAT=${IL_GH_PAT}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACES_VOLUME=construct-server_servo_signal_workspaces
      - PRINCIPLES_PATH=/data/principles/PRINCIPLES.md
    volumes:
      - servo_signal_workspaces:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
      # Absolute path: the runner-side compose is checked out at a different
      # location than ~/construct-server (the GH Actions runner only has
      # construct-server, no sibling imperium-loop), so `../imperium-loop/...`
      # resolves to a nonexistent path during CI deploys. Docker auto-creates
      # the target as an empty directory when the source is missing, which
      # makes /principles 404 silently. Pinning to the canonical host path.
      - /home/magos/imperium-loop/PRINCIPLES.md:/data/principles/PRINCIPLES.md:ro
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- HUMAN-IN-THE-LOOP (Autosavant Discord bot) ---
  autosavant-bot:
    build:
      context: ../imperium-loop/autosavant-bot
      dockerfile: Dockerfile
    container_name: autosavant-bot
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - AUTOSAVANT_HTTP_TOKEN=${AUTOSAVANT_HTTP_TOKEN}
      - SWITCHYARD_TOKEN=${SWITCHYARD_API_TOKEN}
      - STATE_PATH=/data/state.json
    volumes:
      - autosavant_state:/data
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- APP SERVICES ---
  cook_book:
    image: ghcr.io/einlanzerous/cook_book:latest
    container_name: cook_book
    restart: unless-stopped
    ports:
      - "${COOK_BOOK_PORT}:${COOK_BOOK_PORT}"
    environment:
      - PORT=${COOK_BOOK_PORT}
      - DATABASE_URL=postgres://cook_book_user:${COOK_BOOK_DB_PASSWORD}@postgres:5432/cook_book?sslmode=disable
    networks:
      - construct_net
    depends_on:
      - postgres

  # --- ARGOSY (media streaming) ---
  # Single Go binary with the Vue SPA embedded + ffmpeg/Intel-QSV runtime (image
  # published by the argosy repo). Needs /dev/dri for hardware transcoding and
  # the media library mounted read-only.
  argosy:
    image: ghcr.io/einlanzerous/argosy:latest
    container_name: argosy
    restart: unless-stopped
    ports:
      - "${ARGOSY_PORT:-8096}:8096"
    environment:
      - ARGOSY_ADDR=:8096
      - ARGOSY_DATABASE_URL=postgres://argosy_user:${ARGOSY_DB_PASSWORD}@postgres:5432/argosy?sslmode=disable
      - ARGOSY_MEDIA_DIR=/media
      - ARGOSY_ARTWORK_DIR=/artwork
      - ARGOSY_SUBTITLE_DIR=/subtitles
      - ARGOSY_TRANSCODE_DIR=/transcode
      - ARGOSY_SCAN_INTERVAL=${ARGOSY_SCAN_INTERVAL:-15m}
      - ARGOSY_ADMIN_USERNAME=${ARGOSY_ADMIN_USERNAME:-admin}
      - ARGOSY_ADMIN_PASSWORD=${ARGOSY_ADMIN_PASSWORD}
      # PIN-pairing LAN discovery (ARGY-123) can't advertise from this bridge
      # network — multicast never leaves it — so keep the mDNS advertiser off.
      # To enable discovery, switch this service to network_mode: host and set
      # ARGOSY_SERVER_NAME (drop the ports: mapping; the binary listens on 8096).
      - ARGOSY_DISABLE_MDNS=1
      - TMDB_API_READ_ACCESS_KEY=${TMDB_API_READ_ACCESS_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - OPEN_SUBTITLES_API_KEY=${OPEN_SUBTITLES_API_KEY}
      - OPEN_SUBTITLES_USERNAME=${OPEN_SUBTITLES_USERNAME}
      - OPEN_SUBTITLES_PASSWORD=${OPEN_SUBTITLES_PASSWORD}
    volumes:
      - argosy_artwork:/artwork
      - argosy_subtitles:/subtitles
      - argosy_transcode:/transcode
      # Library 1 (NVMe): the original /data/media library. argosy is multi-library
      # (libraries table, per-row root_path) — ARGOSY_MEDIA_DIR is vestigial/unused.
      - ${ARGOSY_MEDIA_DIR_HOST:-/data/media}:/media:ro
      # Library 2 (2TB SATA SSD at /mnt/ssd_storage): active-acquisition shows
      # (24, Futurama S5-11, future grabs). Registered as a second `libraries` row
      # with root_path=/media-ssd. Read-only — only the Servarr stack writes here.
      - /mnt/ssd_storage/media:/media-ssd:ro
    devices:
      - /dev/dri   # Intel QSV / VAAPI hardware transcoding
    group_add:
      - "44"   # video
      - "993"  # render (host GID)
    networks:
      - construct_net
    depends_on:
      - postgres
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- TASK MANAGEMENT (Switchyard) ---
  # Backend (API only). Service name `switchyard` so agent URLs
  # (`http://switchyard:4002/v1/...`) resolve on construct_net.
  # No host port — only the frontend exposes one.
  switchyard:
    image: ghcr.io/einlanzerous/switchyard/backend:latest
    container_name: switchyard
    restart: unless-stopped
    environment:
      - PORT=4002
      - DATABASE_URL=postgres://switchyard_user:${SWITCHYARD_DB_PASSWORD}@postgres:5432/switchyard?sslmode=disable
      - PUBLIC_URL=${SWITCHYARD_PUBLIC_URL:-http://localhost:4002}
      - UPLOAD_DIR=/data/uploads
      - BOOTSTRAP_TOKEN=${SWITCHYARD_BOOTSTRAP_TOKEN}
      # External-ref poller credential. Reuses the host PAT. Unset/expired =>
      # poller logs "GITHUB_TOKEN unset — polling disabled" and attached refs
      # never refresh state (PR-merge auto-close stops firing). Serves as the
      # reconciliation backstop for repos without a push webhook configured.
      - GITHUB_TOKEN=${GITHUB_PAT}
      # Public GitHub webhook receiver — exposed via Tailscale Funnel at
      # https://imperial-construct.tail64150e.ts.net/v1/external/github.
      # HMAC gates all requests; absent secret = receiver returns 503.
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      # Wildcard prefix — match any <KEY>-<NUM> ticket reference in PR
      # titles/branches and resolve via the projects table. Strict "SWY"
      # works fine for a single project but doesn't scale to LOOP etc.
      - EXTERNAL_REF_KEY_PREFIX=*
      # Cloudflare Access SSO (SWY-161) — auto sign-in from the tunnel-injected
      # Cf-Access-Jwt-Assertion JWT. Both must be set or the endpoint returns
      # sso_disabled and the login page falls back to token paste. Values are
      # public identifiers (not secrets): AUD tag + team domain from the Zero
      # Trust dashboard. A CF-verified email must match a switchyard user's email.
      - CF_ACCESS_TEAM_DOMAIN=zero-gravity-industries.cloudflareaccess.com
      - CF_ACCESS_AUD=d3404fc362067f48ff1fd6c9a7fc9a1fd723510c2681feed15e35159649963de
    volumes:
      - switchyard_uploads:/data/uploads
    networks:
      - construct_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4002/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - postgres
    labels:
      # Watchtower runs Mondays at 04:00 with rolling restart — opt out so deploys
      # are explicit. (Suspected source of the prior password-drift bug.)
      - "com.centurylinklabs.watchtower.enable=false"

  # Frontend (Vue static + tiny Bun passthrough for /v1/* and /healthz).
  switchyard-frontend:
    image: ghcr.io/einlanzerous/switchyard/frontend:latest
    container_name: switchyard-frontend
    restart: unless-stopped
    ports:
      - "${SWITCHYARD_PORT:-4002}:4002"
    environment:
      - PORT=4002
      - BACKEND_URL=http://switchyard:4002
    networks:
      - construct_net
    depends_on:
      switchyard:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- NEWSLETTER CURATION (Centrifuge) ---
  # Single image carrying the HTTP API and the decoupled scoring worker.
  # Migrations run in the entrypoint (`centrifuge migrate`) against the
  # centrifuge DB that db/init-db.sh provisions; restart: unless-stopped covers
  # the first-boot race where that DB isn't created until the deploy's init-db
  # step runs after `up -d`. Scoring calls the in-stack ollama by service name.
  centrifuge-backend:
    image: ghcr.io/einlanzerous/centrifuge/backend:latest
    container_name: centrifuge-backend
    restart: unless-stopped
    ports:
      - "${CENTRIFUGE_PORT:-4003}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://centrifuge_user:${CENTRIFUGE_DB_PASSWORD}@postgres:5432/centrifuge?sslmode=disable
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${CENTRIFUGE_OLLAMA_MODEL:-gemma4:31b}
      - INGEST_TOKEN=${CENTRIFUGE_INGEST_TOKEN}
      - RELEVANCE_TOPICS=${CENTRIFUGE_RELEVANCE_TOPICS:-AI engineering,urbanism,transit/trains,nuclear,tech,video games}
      # Absolute base URL stamped into /feed.xml links; blank => derived per request.
      - PUBLIC_BASE_URL=${CENTRIFUGE_PUBLIC_BASE_URL:-}
      - LOG_LEVEL=${CENTRIFUGE_LOG_LEVEL:-info}
    networks:
      - construct_net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # Vue reading UI for Centrifuge: nginx serves the SPA and proxies /api and
  # /feed.xml to the centrifuge backend (same-origin, no CORS). CENTRIFUGE_UPSTREAM
  # points nginx at the backend service; nginx resolves it lazily so the UI
  # survives the backend restarting. Built+pushed from the same release as the
  # backend (CTFG-38).
  centrifuge-frontend:
    image: ghcr.io/einlanzerous/centrifuge/frontend:latest
    container_name: centrifuge-frontend
    restart: unless-stopped
    ports:
      - "${CENTRIFUGE_WEB_PORT:-4004}:8080"
    environment:
      - CENTRIFUGE_UPSTREAM=centrifuge-backend:8080
    networks:
      - construct_net
    depends_on:
      - centrifuge-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- LYCEUM (self-hosted ebook reader + sync) — LYCM-61 ---
  # One Go binary serving the JSON API *and* the embedded Vue reader SPA
  # same-origin (image published by the lyceum repo). Shared Postgres; EPUB/cover
  # blobs on a named volume; folder-ingest watches the acquisition books library
  # read-only. Native apps (Android/Windows) + the browser reader all hit :4005.
  lyceum:
    image: ghcr.io/einlanzerous/lyceum:latest
    container_name: lyceum
    restart: unless-stopped
    ports:
      - "${LYCEUM_PORT:-4005}:4005"
    environment:
      - LYCEUM_ADDR=:4005
      - LYCEUM_DATABASE_URL=postgres://lyceum_user:${LYCEUM_DB_PASSWORD}@postgres:5432/lyceum?sslmode=disable
      - LYCEUM_DATA_DIR=/data/blobs
      # Folder ingest: EPUBs dropped into the mounted books library are ingested
      # like an /upload. Absorbs LYCM-57 (prod must set the watch dir).
      - LYCEUM_BOOKS_WATCH_DIR=/books
      - LYCEUM_BOOKS_WATCH_INTERVAL=${LYCEUM_BOOKS_WATCH_INTERVAL:-15}
      # Canonical cover fetch (Apple Books/iTunes) fills poor embedded covers.
      - LYCEUM_COVER_FETCH=${LYCEUM_COVER_FETCH:-true}
      # CORS for cross-origin native shells (Wails desktop). Blank => same-origin
      # web build only, which sends no Origin.
      - LYCEUM_CORS_ORIGINS=${LYCEUM_CORS_ORIGINS:-}
      # Optional Eidolon/delivery API tokens + Send-to-Kindle SMTP (LYCM-40x).
      # Unset => those features stay disabled.
      - LYCEUM_API_TOKENS=${LYCEUM_API_TOKENS:-}
      - LYCEUM_SMTP_HOST=${LYCEUM_SMTP_HOST:-}
      - LYCEUM_SMTP_PORT=${LYCEUM_SMTP_PORT:-587}
      - LYCEUM_SMTP_USERNAME=${LYCEUM_SMTP_USERNAME:-}
      - LYCEUM_SMTP_PASSWORD=${LYCEUM_SMTP_PASSWORD:-}
      - LYCEUM_SMTP_FROM=${LYCEUM_SMTP_FROM:-}
      - LYCEUM_KINDLE_ADDR=${LYCEUM_KINDLE_ADDR:-}
    volumes:
      - lyceum_data:/data/blobs
      # Books library to fold-ingest, read-only (defaults alongside argosy media).
      - ${LYCEUM_BOOKS_DIR_HOST:-/data/media/books}:/books:ro
    networks:
      - construct_net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4005/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- EDGE PROXY (Traefik) — Zero Gravity Industries hybrid edge (SERV-20) ---
  # Split entrypoints are the security keystone: `public` (WAN-forwarded 443) serves
  # ONLY Argosy + a deny-all catch-all; `internal` (:9080 HTTP, deliberately NOT
  # published) carries the tunneled apps and is the cloudflared origin. Identity headers are
  # stripped on ingress. TLS via Let's Encrypt DNS-01 (Cloudflare). File provider only
  # — no Docker socket, edge policy is committed under config/traefik/.
  #
  # LIVE for the tunnel path: cloudflared → internal → switchyard, gated by Cloudflare
  # Access. The public/Argosy path is NOT wired yet — it needs the CF token for certs
  # (SERV-21) and the Phase 3 relay (line is behind CGNAT — SERV-15). TLS issuance
  # no-ops until the token lands, which is fine (tunnel apps use Cloudflare's edge cert).
  # See docs/zerogravity-edge.md.
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    # No host port published: the public/Argosy path is CGNAT-blocked (SERV-15) AND host
    # 443 is currently held by Tailscale Funnel. cloudflared reaches the `internal`
    # entrypoint over construct_net, so the tunnel path needs no host bind. `internal`
    # (:9080) and the dashboard (:8080) are construct_net-only by design. Re-enable the
    # public bind when the Phase 3 relay lands (on a free interface if 443 is still taken):
    #   ports:
    #     - "443:8443"   # -> public entrypoint (:8443)
    environment:
      # Scoped Cloudflare token (Zone:DNS:Edit on zerogravity.industries) for the
      # ACME DNS-01 challenge. Set in .env once minted (SERV-14 / SERV-21).
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    volumes:
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- CLOUDFLARE TUNNEL (cloudflared) — SERV-23 ---
  # Dashboard-managed (token) tunnel. Runs ON construct_net so it can reach Traefik's
  # unpublished `internal` entrypoint at http://traefik:9080 — a host-run connector
  # cannot, which is why this must be containerized here. Ingress (public hostname →
  # http://traefik:9080) is configured in the Zero Trust dashboard (SERV-24), not a
  # local config file. No open ports: cloudflared dials out to the Cloudflare edge.
  #
  # NOTE: retire any host-run `cloudflared tunnel run` (and its systemd service)
  # before starting this — two connectors on one token would let Cloudflare route
  # requests to the host connector, which can't reach traefik:9080. See docs.
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_TAG:-latest}
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Same token you stored in .env for the host run — reused verbatim.
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - construct_net
    depends_on:
      - traefik
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- IDENTITY (Authentik) — SERV-19 ---
  # Self-hosted IdP and source of truth for the hybrid edge. Uses the shared
  # postgres (authentik DB provisioned by db/init-db.sh) + a dedicated Redis.
  # NO public exposure: the server HTTP port is bound to localhost only for
  # first-boot admin (akadmin) setup; Phase 2 fronts it via Traefik `internal`
  # + an Access-exempt tunnel hostname. Forward-auth/OIDC integrations point at
  # http://authentik-server:9000 over construct_net, so identity on the direct
  # path survives a Cloudflare outage.
  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-stable}
    container_name: authentik-server
    restart: unless-stopped
    # Gated behind the `identity` profile: NOT started by a plain `docker compose up -d`.
    # Bring up deliberately AFTER setting AUTHENTIK_* secrets in .env and provisioning
    # the DB (postgres must be recreated to pick up AUTHENTIK_DB_PASSWORD, then `make db-init`):
    #   docker compose --profile identity up -d authentik-redis authentik-server authentik-worker
    profiles: ["identity"]
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__USER=authentik_user
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
      - AUTHENTIK_DISABLE_UPDATE_CHECK=true
      # First-boot admin bootstrap (akadmin). Consumed only on initial DB init.
      - AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL:-}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      - AUTHENTIK_BOOTSTRAP_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN:-}
    ports:
      # localhost-only — reach via SSH forward for initial setup; never 0.0.0.0.
      - "127.0.0.1:9000:9000"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - construct_net
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-stable}
    container_name: authentik-worker
    restart: unless-stopped
    profiles: ["identity"]
    command: worker
    # Background tasks (cert rotation, outpost mgmt, email). Upstream runs the
    # worker as root. No Docker socket mounted — Traefik forward-auth uses the
    # embedded outpost in the server, so no docker-managed outposts are needed.
    user: root
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__USER=authentik_user
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
      - AUTHENTIK_DISABLE_UPDATE_CHECK=true
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - construct_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # Dedicated Redis for Authentik (nothing else in the stack uses one).
  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    profiles: ["identity"]
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis_data:/data
    networks:
      - construct_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  open-webui:
  ollama_data:
  n8n_data:
  copyparty_data:
  uptime-kuma-data:
  semaphore_data:
  postgres_data:
  servo_signal_workspaces:
  autosavant_state:
  switchyard_uploads:
  argosy_artwork:
  argosy_subtitles:
  argosy_transcode:
  lyceum_data:
  # Zero Gravity Industries hybrid edge (SERV-19/20)
  traefik_letsencrypt:
  authentik_media:
  authentik_templates:
  authentik_redis_data:

networks:
  construct_net:
    external: true
