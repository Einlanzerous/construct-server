# Copyparty config — file server for the Argosy media library.
# The site root maps straight to /data/media on the host (the 1TB NVMe),
# which is the same directory Argosy streams from (ARGOSY_MEDIA_DIR_HOST).
# Drop video files here from your desktop and Argosy picks them up on its
# next scan (POST /api/v1/scan, or the periodic sweep).
#
# Container mounts (see docker-compose.yml):
#   copyparty_data -> /w          (internal volume, unused here)
#   /data          -> /w/hdd      (host NVMe; /w/hdd/media == /data/media)

[global]
  e2dsa          # build/maintain the up2k index (dedup, resumable uploads)
  e2ts           # parse media tags (duration/codec) on upload
  no-robots      # discourage crawlers

[/]
  /w/hdd/media
  accs:
    rwmd: *        # read / write / move / delete for everyone (anonymous);
                   # no login required — access is gated by Tailscale at the network layer
